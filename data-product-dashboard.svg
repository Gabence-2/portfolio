<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio analytics dashboard preview</title>
  <desc id="desc">A comic-style analytics dashboard with charts, metric cards, and portfolio performance data.</desc>
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#151515" opacity="0.16"/>
    </pattern>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#dff6f1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="#fffaf0"/>
  <rect width="900" height="520" fill="url(#dots)"/>
  <path d="M0 390 L900 105 L900 520 L0 520 Z" fill="#ffbe0b" opacity="0.28"/>

  <rect x="55" y="45" width="790" height="430" rx="8" fill="url(#panel)" stroke="#151515" stroke-width="10"/>
  <rect x="55" y="45" width="790" height="78" rx="8" fill="#151515"/>
  <circle cx="94" cy="84" r="11" fill="#e63946"/>
  <circle cx="132" cy="84" r="11" fill="#ffbe0b"/>
  <circle cx="170" cy="84" r="11" fill="#2a9d8f"/>
  <text x="220" y="94" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">PORTFOLIO SIGNALS</text>

  <rect x="95" y="155" width="190" height="105" rx="8" fill="#ffffff" stroke="#151515" stroke-width="6"/>
  <text x="120" y="195" fill="#e63946" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">PROJECT VIEWS</text>
  <text x="120" y="238" fill="#151515" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="900">8.4K</text>

  <rect x="325" y="155" width="190" height="105" rx="8" fill="#ffffff" stroke="#151515" stroke-width="6"/>
  <text x="350" y="195" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">CONTACT RATE</text>
  <text x="350" y="238" fill="#151515" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="900">42%</text>

  <rect x="555" y="155" width="250" height="105" rx="8" fill="#ffffff" stroke="#151515" stroke-width="6"/>
  <text x="580" y="195" fill="#2a9d8f" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">SKILL MATCH</text>
  <text x="580" y="238" fill="#151515" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="900">96%</text>

  <rect x="95" y="302" width="420" height="125" rx="8" fill="#ffffff" stroke="#151515" stroke-width="6"/>
  <polyline points="125,395 180,365 235,382 290,330 345,350 405,314 480,340" fill="none" stroke="#e63946" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="125,410 180,400 235,392 290,378 345,360 405,356 480,336" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="125" y="335" fill="#151515" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Growth Trend</text>

  <rect x="555" y="302" width="250" height="125" rx="8" fill="#ffffff" stroke="#151515" stroke-width="6"/>
  <rect x="585" y="380" width="28" height="28" fill="#e63946"/>
  <rect x="628" y="350" width="28" height="58" fill="#ffbe0b"/>
  <rect x="671" y="330" width="28" height="78" fill="#2a9d8f"/>
  <rect x="714" y="315" width="28" height="93" fill="#2563eb"/>
  <rect x="757" y="342" width="28" height="66" fill="#151515"/>
  <text x="585" y="335" fill="#151515" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">Engagement</text>
