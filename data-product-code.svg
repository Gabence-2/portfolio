<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio code workflow preview</title>
  <desc id="desc">A comic-style code editor showing frontend and data workflow blocks.</desc>
  <defs>
    <pattern id="lines" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <line x1="0" y1="0" x2="0" y2="18" stroke="#151515" stroke-opacity="0.08" stroke-width="3"/>
    </pattern>
  </defs>
  <rect width="900" height="520" fill="#fffdf7"/>
  <rect width="900" height="520" fill="url(#lines)"/>
  <rect x="70" y="60" width="760" height="400" rx="8" fill="#151515" stroke="#151515" stroke-width="10"/>
  <rect x="95" y="92" width="710" height="54" rx="6" fill="#ffffff"/>
  <circle cx="132" cy="119" r="11" fill="#e63946"/>
  <circle cx="168" cy="119" r="11" fill="#ffbe0b"/>
  <circle cx="204" cy="119" r="11" fill="#2a9d8f"/>
  <text x="250" y="128" fill="#151515" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900">portfolio.js</text>
  <text x="120" y="205" fill="#ffbe0b" font-family="Consolas, monospace" font-size="31" font-weight="700">const insight = users.map(signal =&gt; build(signal));</text>
  <text x="120" y="260" fill="#2a9d8f" font-family="Consolas, monospace" font-size="31" font-weight="700">renderDashboard({ speed, clarity, trust });</text>
  <text x="120" y="315" fill="#ffffff" font-family="Consolas, monospace" font-size="31" font-weight="700">shipAccessibleExperience();</text>
  <rect x="120" y="360" width="210" height="48" fill="#e63946"/>
  <rect x="355" y="360" width="160" height="48" fill="#ffbe0b"/>
  <rect x="540" y="360" width="225" height="48" fill="#2a9d8f"/>
</svg>
